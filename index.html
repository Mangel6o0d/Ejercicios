<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>¿Me perdonas?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: purple; /* Fondo morado */

    }
    button {
      padding: 10px 20px;
      margin: 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #mensaje {
      margin-top: 30px;
      font-size: 20px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>¿Me perdonas?</h1>
  <button id="si">Sí</button>
  <button id="no">No</button>
  <div id="mensaje"></div>

  <script>
    const btnSi = document.getElementById("si");
    const btnNo = document.getElementById("no");
    const mensaje = document.getElementById("mensaje");

    btnSi.addEventListener("click", () => {
      mensaje.textContent = "¡Gracias!";
    });

    btnNo.addEventListener("mouseover", () => {
      // Cambia la posición del botón "No" aleatoriamente
      btnNo.style.position = "absolute";
      btnNo.style.top = Math.random() * window.innerHeight + "px";
      btnNo.style.left = Math.random() * window.innerWidth + "px";
    });
  </script>
</body>
</html>
